<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="nodeGrad" x1="14" y1="12" x2="66" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="14" y1="12" x2="66" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <polyline
    points="40,22 56,31 56,49 40,58 24,49 24,31 40,22"
    stroke="url(#edgeGrad)" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
  <line x1="40" y1="40" x2="40" y2="22" stroke="url(#edgeGrad)" stroke-width="0.9"/>
  <line x1="40" y1="40" x2="56" y2="31" stroke="url(#edgeGrad)" stroke-width="0.9"/>
  <line x1="40" y1="40" x2="56" y2="49" stroke="url(#edgeGrad)" stroke-width="0.9"/>
  <line x1="40" y1="40" x2="40" y2="58" stroke="url(#edgeGrad)" stroke-width="0.9"/>
  <line x1="40" y1="40" x2="24" y2="49" stroke="url(#edgeGrad)" stroke-width="0.9"/>
  <line x1="40" y1="40" x2="24" y2="31" stroke="url(#edgeGrad)" stroke-width="0.9"/>
  <circle cx="40" cy="22" r="3.3" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="56" cy="31" r="3.3" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="56" cy="49" r="3.3" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="58" r="3.3" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="24" cy="49" r="3.3" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="24" cy="31" r="3.3" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="40" cy="40" r="7.2" fill="url(#centerGrad)" filter="url(#glowSoft)"/>
  <circle cx="37.5" cy="37.5" r="2.4" fill="white" opacity="0.35"/>

  <!-- Wordmark (dark variant: white + gradient) -->
  <text
    x="84" y="52"
    font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif"
    font-size="36"
    letter-spacing="-0.3">
    <tspan font-weight="300" fill="#94A3B8">code</tspan><tspan font-weight="700" fill="url(#textGrad)">bot</tspan>
  </text>
</svg>
