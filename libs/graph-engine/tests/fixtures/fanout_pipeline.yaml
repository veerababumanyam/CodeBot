name: fanout_pipeline
version: "1.0"
description: "Pipeline with dynamic fan-out from planner to workers via compiler integration"
nodes:
  - id: planner
    type: agent
    config:
      agent_type: PLANNER
      fanout:
        task_key: pending_tasks
        worker_node: agent_worker
    timeout_seconds: 300
  - id: agent_worker
    type: agent
    config:
      agent_type: BACKEND_DEV
    timeout_seconds: 600
  - id: merger
    type: merge
    config:
      strategy: combine_outputs
edges:
  - source: planner
    target: agent_worker
    type: state_flow
  - source: agent_worker
    target: merger
    type: state_flow
  - source: planner
    target: merger
    type: state_flow
entry_nodes: [planner]
exit_nodes: [merger]
