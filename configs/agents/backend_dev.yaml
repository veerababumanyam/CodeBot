agent:
  type: BACKEND_DEV
  model: anthropic/claude-sonnet-4
  fallback_model: openai/gpt-4.1
  max_tokens: 8192
  temperature: 0.1
  tools:
    - file_read
    - file_write
    - file_edit
    - bash
  context_tiers:
    l0: 2000
    l1: 12000
    l2: 20000
  retry_policy:
    max_retries: 3
    base_delay_seconds: 2
    max_delay_seconds: 60
    exponential_base: 2
  timeout: 600
  settings:
    framework: fastapi
    language: python
    lint_command: "ruff check --fix"
    format_command: "ruff format"
    typecheck_command: "mypy --strict"
    max_lint_retries: 2
    enable_self_test: true
