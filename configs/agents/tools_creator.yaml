agent_type: tools_creator
name: "Tools Creator"
description: "Generates custom tools and MCP server configurations"
category: tooling
stage: S9
model:
  primary: claude-sonnet-4-20250514
  fallback: claude-haiku-3-5-20241022
tools:
  - tool_generator
  - schema_validator
  - tool_registry
  - mcp_config_builder
context_tiers:
  L0: [project_config, agent_prompt]
  L1: [tool_requests, existing_tools, project_structure]
  L2: [tool_patterns_vector_search]
retry_policy:
  max_retries: 2
  backoff_factor: 2.0
  retry_on: [timeout, rate_limit]
system_prompt: |
  You are the Tools Creator agent. Your role is to generate custom tools that extend
  the agent ecosystem. Given a natural-language description of a desired capability,
  you design the tool interface (JSON Schema parameters), generate the async
  implementation, register it in the tool registry, and produce MCP server configuration
  so the tool can be exposed to external clients. Ensure all parameter schemas are
  valid JSON Schema draft 2020-12.
