agent:
  type: ORCHESTRATOR
  model: anthropic/claude-sonnet-4
  fallback_model: openai/gpt-4.1
  max_tokens: 4096
  temperature: 0.2
  tools:
    - file_read
  context_tiers:
    l0: 2000
    l1: 8000
    l2: 16000
  retry_policy:
    max_retries: 3
    base_delay_seconds: 2
    max_delay_seconds: 60
    exponential_base: 2
  timeout: 300
  settings:
    confidence_threshold: 0.7
    auto_infer_on_ambiguity: true
