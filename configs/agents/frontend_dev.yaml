agent:
  type: FRONTEND_DEV
  model: anthropic/claude-sonnet-4
  fallback_model: openai/gpt-4.1
  max_tokens: 8192
  temperature: 0.2
  tools:
    - file_read
    - file_write
    - file_edit
    - bash
    - browser_preview
    - component_generator
    - style_generator
  context_tiers:
    l0: 2000
    l1: 12000
    l2: 20000
  retry_policy:
    max_retries: 3
    base_delay_seconds: 2
    max_delay_seconds: 60
    exponential_base: 2
  timeout: 900
  settings:
    use_worktree: true
    target_frameworks:
      - react
      - next
    language: typescript
    lint_command: "eslint --fix"
    format_command: "prettier --write"
    typecheck_command: "tsc --noEmit"
    enable_self_test: true
