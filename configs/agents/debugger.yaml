debugger:
  agent_type: DEBUGGER
  model: claude-opus-4
  fallback_model: gpt-4.1
  provider: anthropic
  max_tokens: 8192
  temperature: 0.2
  tools:
    - file_read
    - file_write
    - file_edit
    - bash
    - test_runner
    - stack_trace_analyzer
    - root_cause_analyzer
    - security_fix_generator
  context_tiers:
    l0: 2000
    l1: 16000
    l2: 24000
  retry_policy:
    max_retries: 2
    base_delay_seconds: 2
    max_delay_seconds: 30
    exponential_base: 2
  timeout: 900
  settings:
    use_worktree: true
    max_fix_iterations: 3
    security_debugging: true
