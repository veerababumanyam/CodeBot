agent:
  type: INFRA_ENGINEER
  model: anthropic/claude-sonnet-4
  fallback_model: openai/gpt-4.1
  max_tokens: 8192
  temperature: 0.1
  tools:
    - file_read
    - file_write
    - bash
    - terraform_validate
    - docker_build
    - kubectl
    - config_renderer
  context_tiers:
    l0: 2000
    l1: 12000
    l2: 20000
  retry_policy:
    max_retries: 3
    base_delay_seconds: 2
    max_delay_seconds: 60
    exponential_base: 2
  timeout: 600
  settings:
    use_worktree: true
    target_infra:
      - docker
      - kubernetes
      - github-actions
    enable_self_test: true
