agent:
  type: CODE_REVIEWER
  model: anthropic/claude-sonnet-4
  fallback_model: openai/gpt-4.1
  max_tokens: 4096
  temperature: 0.2
  tools:
    - file_read
    - search_code
  context_tiers:
    l0: 2000
    l1: 16000
    l2: 20000
  retry_policy:
    max_retries: 2
    base_delay_seconds: 2
    max_delay_seconds: 30
    exponential_base: 2
  timeout: 300
  settings:
    gate_on_critical: true
    gate_on_high: true
    max_review_iterations: 2
