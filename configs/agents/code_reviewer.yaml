code_reviewer:
  agent_type: CODE_REVIEWER
  model: claude-opus-4
  fallback_model: o3
  provider: anthropic
  max_tokens: 8192
  temperature: 0.2
  tools:
    - file_read
    - code_analyzer
    - pattern_detector
    - complexity_analyzer
    - review_comment_writer
  context_tiers:
    l0: 2000
    l1: 16000
    l2: 20000
  retry_policy:
    max_retries: 2
    base_delay_seconds: 2
    max_delay_seconds: 30
    exponential_base: 2
  timeout: 600
  settings:
    gate_on_critical: true
    gate_on_high: true
    max_review_iterations: 2
