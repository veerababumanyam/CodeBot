agent:
  type: TESTER
  model: anthropic/claude-sonnet-4
  fallback_model: openai/gpt-4.1
  max_tokens: 8192
  temperature: 0.1
  tools:
    - file_read
    - file_write
    - bash
  context_tiers:
    l0: 2000
    l1: 16000
    l2: 24000
  retry_policy:
    max_retries: 2
    base_delay_seconds: 2
    max_delay_seconds: 30
    exponential_base: 2
  timeout: 600
  settings:
    coverage_target: 80
    max_coverage_retries: 1
    test_framework: pytest
    run_twice_on_failure: true
