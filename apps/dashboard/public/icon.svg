<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="nodeGrad" x1="24" y1="20" x2="76" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="24" y1="20" x2="76" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hex edges: V0(50,20) V1(76,35) V2(76,65) V3(50,80) V4(24,65) V5(24,35) -->
  <polyline
    points="50,20 76,35 76,65 50,80 24,65 24,35 50,20"
    stroke="url(#edgeGrad)" stroke-width="1.4" stroke-linejoin="round" fill="none"/>

  <!-- Spokes: center → each vertex -->
  <line x1="50" y1="50" x2="50"  y2="20" stroke="url(#edgeGrad)" stroke-width="1.1"/>
  <line x1="50" y1="50" x2="76"  y2="35" stroke="url(#edgeGrad)" stroke-width="1.1"/>
  <line x1="50" y1="50" x2="76"  y2="65" stroke="url(#edgeGrad)" stroke-width="1.1"/>
  <line x1="50" y1="50" x2="50"  y2="80" stroke="url(#edgeGrad)" stroke-width="1.1"/>
  <line x1="50" y1="50" x2="24"  y2="65" stroke="url(#edgeGrad)" stroke-width="1.1"/>
  <line x1="50" y1="50" x2="24"  y2="35" stroke="url(#edgeGrad)" stroke-width="1.1"/>

  <!-- Outer nodes (6 agents) -->
  <circle cx="50" cy="20" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="76" cy="35" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="76" cy="65" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="50" cy="80" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="24" cy="65" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="24" cy="35" r="5.5" fill="url(#nodeGrad)" filter="url(#glow)"/>

  <!-- Central orchestrator node -->
  <circle cx="50" cy="50" r="12" fill="url(#centerGrad)" filter="url(#glowSoft)"/>
  <!-- Inner specular highlight -->
  <circle cx="46" cy="46" r="4" fill="white" opacity="0.35"/>
</svg>
